<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audit — บันทึกระบบ — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — AuditLogViewerPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">Audit</div>
          <a class="nav-link active" href="#">Audit log</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">Audit log</span>
          <div class="header-actions"><div class="avatar">A</div></div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">บันทึกการเปลี่ยนแปลง</h1>
            <button type="button" class="btn btn-sm">Export</button>
          </div>
          <div class="card card-pad flex-row filter-toolbar--tight">
            <input class="input" type="datetime-local" />
            <span class="text-muted">ถึง</span>
            <input class="input" type="datetime-local" />
            <select class="text-input select-auto"><option>ทุก entity</option><option>invoice</option><option>journal</option></select>
            <input class="input input-max-w-xs" placeholder="user / action" />
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>เวลา</th>
                  <th>ผู้ใช้</th>
                  <th>การกระทำ</th>
                  <th>Entity</th>
                  <th>รายละเอียด</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="text-mono text-sm">2025-04-17 10:02</td>
                  <td>admin@erp.com</td>
                  <td>UPDATE</td>
                  <td class="text-mono">invoice:INV-001</td>
                  <td>status: draft → sent</td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
