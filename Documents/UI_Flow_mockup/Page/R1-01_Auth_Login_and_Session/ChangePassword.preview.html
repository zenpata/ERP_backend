<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change password — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span
        ><strong>Static preview</strong> — เปลี่ยนรหัสผ่าน (modal) · ไม่เชื่อม API</span
      >
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>

    <div class="main-content" style="min-height: 50vh; padding-top: 48px">
      <p class="text-muted text-center">
        พื้นหลังจำลองหน้าแอป — โฟกัสที่กล่อง modal กลางจอ
      </p>
    </div>

    <div class="modal-backdrop" role="presentation">
      <div class="preview-stack" style="width: 100%; max-width: 380px; margin: 0 auto">
        <div class="control-panel" style="margin-bottom: 12px">
          <h2>Preview controls</h2>
          <label class="control-row">
            <input id="toggleSubmitting" type="checkbox" />
            <span>กำลังบันทึก (submitting)</span>
          </label>
          <label class="control-row">
            <input id="toggleInlineError" type="checkbox" />
            <span>ข้อผิดพลาด inline (รหัสเดิมผิด)</span>
          </label>
          <label class="control-row">
            <input id="toggleSuccess" type="checkbox" />
            <span>แสดง toast สำเร็จ (จำลอง)</span>
          </label>
        </div>

        <div class="modal-dialog modal-dialog--wide" role="dialog" aria-labelledby="cp-title">
          <div class="modal-dialog__head">
            <h1 id="cp-title">เปลี่ยนรหัสผ่าน</h1>
            <p class="hint" style="margin: 8px 0 0">
              รหัสใหม่อย่างน้อย 8 ตัวอักษร แนะนำผสมตัวเลขและสัญลักษณ์
            </p>
          </div>
          <form class="modal-dialog__body" onsubmit="event.preventDefault()">
            <div class="field">
              <label class="label" for="currentPw">รหัสผ่านปัจจุบัน</label>
              <input
                id="currentPw"
                class="input"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
              />
            </div>
            <div class="field">
              <label class="label" for="newPw">รหัสผ่านใหม่</label>
              <input
                id="newPw"
                class="input"
                type="password"
                autocomplete="new-password"
                placeholder="••••••••"
              />
            </div>
            <div class="field">
              <label class="label" for="confirmPw">ยืนยันรหัสผ่านใหม่</label>
              <input
                id="confirmPw"
                class="input"
                type="password"
                autocomplete="new-password"
                placeholder="••••••••"
              />
              <p id="inlineError" class="error-text" hidden>
                รหัสผ่านปัจจุบันไม่ถูกต้อง กรุณาลองใหม่
              </p>
            </div>
          </form>
          <div class="modal-dialog__foot">
            <button type="button" class="btn">ยกเลิก</button>
            <button id="saveBtn" type="button" class="btn btn-primary">บันทึก</button>
          </div>
        </div>
      </div>
    </div>

    <div
      id="toastSuccess"
      class="card card-pad"
      hidden
      style="
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 60;
        max-width: 320px;
        border-color: color-mix(in srgb, var(--success-fg) 35%, var(--border));
        background: var(--success-bg);
        color: var(--success-fg);
        box-shadow: 0 10px 30px color-mix(in srgb, var(--foreground) 15%, transparent);
      "
    >
      <strong>บันทึกสำเร็จ</strong>
      <p class="hint hint--tight" style="color: inherit; opacity: 0.9">
        รหัสผ่านถูกอัปเดตแล้ว (จำลอง)
      </p>
    </div>

    <script>
      (function () {
        var dark = document.getElementById("previewDarkMode");
        var submitting = document.getElementById("toggleSubmitting");
        var inlineErr = document.getElementById("toggleInlineError");
        var success = document.getElementById("toggleSuccess");
        var saveBtn = document.getElementById("saveBtn");
        var errEl = document.getElementById("inlineError");
        var toast = document.getElementById("toastSuccess");
        function sync() {
          document.documentElement.classList.toggle("dark", dark.checked);
          errEl.hidden = !inlineErr.checked;
          toast.hidden = !success.checked;
          if (submitting.checked) {
            saveBtn.disabled = true;
            saveBtn.textContent = "กำลังบันทึก...";
          } else {
            saveBtn.disabled = false;
            saveBtn.textContent = "บันทึก";
          }
        }
        [dark, submitting, inlineErr, success].forEach(function (el) {
          el.addEventListener("change", sync);
        });
        sync();
      })();
    </script>
  </body>
</html>
