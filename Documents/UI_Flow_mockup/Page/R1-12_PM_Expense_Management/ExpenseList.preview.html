<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM — Expense — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — ExpenseListPage</span>
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">PM</div>
          <a class="nav-link active" href="#">Expense</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">Expense</span>
          <div class="header-actions">
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content stack-y-4">
          <div class="page-header">
            <h1 class="m-0">รายการ Expense</h1>
            <button type="button" class="btn btn-primary btn-sm">+ สร้าง</button>
          </div>
          <p class="hint">คลิกหัวคอลัมน์เพื่อเรียงลำดับ (mock)</p>
          <div class="grid-4">
            <div class="card card-pad">
              <div class="stat-val">2</div>
              <div class="stat-lbl">Draft</div>
            </div>
            <div class="card card-pad">
              <div class="stat-val">3</div>
              <div class="stat-lbl">Pending Approval</div>
            </div>
            <div class="card card-pad">
              <div class="stat-val">5</div>
              <div class="stat-lbl">Approved</div>
            </div>
            <div class="card card-pad">
              <div class="stat-val">1</div>
              <div class="stat-lbl">Paid</div>
            </div>
          </div>
          <div class="card card-pad">
            <input class="input input-max-w-lg" placeholder="ค้นหา..." />
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>หัวข้อ ↑</th>
                  <th>Budget</th>
                  <th>ยอด</th>
                  <th>สถานะ</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="text-mono">e1</td>
                  <td>ค่าเดินทาง</td>
                  <td class="text-mono text-primary">uuid…</td>
                  <td>฿2,500</td>
                  <td><span class="badge badge-outline">Draft</span></td>
                  <td><button type="button" class="icon-btn">👁</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("previewDarkMode");
        if (!el) return;
        function s() {
          document.documentElement.classList.toggle("dark", el.checked);
        }
        el.addEventListener("change", s);
        s();
      })();
    </script>
  </body>
</html>
