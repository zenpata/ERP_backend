<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ภาษี — สรุป VAT รายเดือน — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — VATMonthlySummaryPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">ภาษีไทย</div>
          <a class="nav-link active" href="#">VAT รายเดือน</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">VAT สรุป</span>
          <div class="header-actions"><div class="avatar">A</div></div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">สรุปภาษีซื้อ–ขาย</h1>
            <button type="button" class="btn btn-sm">Export</button>
          </div>
          <div class="card card-pad flex-row filter-toolbar--tight">
            <label>เดือน <input class="input input-w-64" type="number" value="4" /></label>
            <label>ปี <input class="input input-w-80" type="number" value="2568" /></label>
            <button type="button" class="btn btn-primary btn-sm">โหลด</button>
          </div>
          <div class="grid-2 card card-pad">
            <div><div class="text-muted text-xs">ภาษีขาย</div><div class="font-medium">฿70,000</div></div>
            <div><div class="text-muted text-xs">ภาษีซื้อ</div><div class="font-medium">฿42,000</div></div>
            <div><div class="text-muted text-xs">ภาษีที่ต้องชำระ (mock)</div><div class="font-medium">฿28,000</div></div>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
