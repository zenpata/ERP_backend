<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ภาษี — ศูนย์กลาง — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — TaxHubPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">ภาษีไทย</div>
          <a class="nav-link active" href="#">Tax hub</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">ภาษี</span>
          <div class="header-actions"><div class="avatar">A</div></div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">ศูนย์กลางภาษี</h1>
          </div>
          <div class="grid-2">
            <a href="#" class="card card-pad"><h3 class="subsection-title">สรุปภาษีซื้อ-ขาย</h3><p class="text-muted m-0">VAT รายเดือน</p></a>
            <a href="#" class="card card-pad"><h3 class="subsection-title">หัก ณ ที่จ่าย</h3><p class="text-muted m-0">WHT certificates</p></a>
            <a href="#" class="card card-pad"><h3 class="subsection-title">ภงด.</h3><p class="text-muted m-0">PND reports</p></a>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
