<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ภาษี — หนังสือรับรองหัก ณ ที่จ่าย — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — WHTCertificateListPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">ภาษีไทย</div>
          <a class="nav-link active" href="#">WHT</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">หนังสือรับรอง หัก ณ ที่จ่าย</span>
          <div class="header-actions"><div class="avatar">A</div></div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">รายการหนังสือรับรอง</h1>
            <button type="button" class="btn btn-primary btn-sm">ออกหนังสือใหม่</button>
          </div>
          <div class="card card-pad flex-row filter-toolbar--tight">
            <input class="input input-max-w-xs" placeholder="ค้นหาเลขที่ / ผู้ถูกหัก" />
            <input class="input" type="month" value="2025-04" />
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>เลขที่</th>
                  <th>วันที่</th>
                  <th>ผู้ถูกหัก</th>
                  <th class="text-right">ยอดจ่าย</th>
                  <th class="text-right">ภาษีหัก</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="text-mono">WHT-2025-01</td>
                  <td>15/04/2568</td>
                  <td>บริษัท ซัพพลาย จำกัด</td>
                  <td class="text-right">฿20,000</td>
                  <td class="text-right">฿600</td>
                  <td><button type="button" class="btn btn-sm">PDF</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
