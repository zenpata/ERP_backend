<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ภาษี — รายงาน ภงด. — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — PNDReportPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">ภาษีไทย</div>
          <a class="nav-link active" href="#">ภงด.</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">รายงาน ภงด.</span>
          <div class="header-actions"><div class="avatar">A</div></div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">ภงด. (mock)</h1>
            <button type="button" class="btn btn-sm">Export PDF</button>
          </div>
          <div class="card card-pad flex-row filter-toolbar--tight">
            <select class="text-input"><option>ภงด.1</option><option>ภงด.3</option><option>ภงด.53</option></select>
            <input class="input" type="month" value="2025-04" />
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>รายการ</th>
                  <th class="text-right">จำนวนเงิน</th>
                  <th class="text-right">ภาษี</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>เงินเดือน (ตัวอย่าง)</td>
                  <td class="text-right">฿100,000</td>
                  <td class="text-right">฿5,000</td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
