<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance — ฟอร์มบัญชี — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — ChartOfAccountsFormPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">การเงิน</div>
          <a class="nav-link active" href="#">ผังบัญชี</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">เพิ่ม / แก้ไขบัญชี</span>
          <div class="header-actions">
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">บัญชีใหม่</h1>
            <button type="button" class="btn btn-sm">ยกเลิก</button>
          </div>

          <div class="card card-pad stack-y-4">
            <div class="grid-2">
              <div class="field">
                <span class="label">รหัสบัญชี</span>
                <input class="input text-mono" placeholder="เช่น 5-5200" />
              </div>
              <div class="field">
                <span class="label">ชื่อบัญชี (ไทย)</span>
                <input class="input" />
              </div>
              <div class="field">
                <span class="label">ประเภท</span>
                <select class="text-input">
                  <option>สินทรัพย์</option>
                  <option>หนี้สิน</option>
                  <option>ทุน</option>
                  <option>รายได้</option>
                  <option>ค่าใช้จ่าย</option>
                </select>
              </div>
              <div class="field">
                <span class="label">บัญชีแม่ (ถ้ามี)</span>
                <select class="text-input">
                  <option>— ไม่มี —</option>
                  <option>5-5000 ค่าใช้จ่ายทั่วไป</option>
                </select>
              </div>
              <div class="field field-span-full">
                <span class="label">คำอธิบาย</span>
                <input class="input" />
              </div>
              <div class="field">
                <label class="flex-row" style="gap: 0.5rem; align-items: center">
                  <input type="checkbox" checked /> ใช้งาน
                </label>
              </div>
            </div>
            <p class="error-text" hidden id="valErr">รหัสบัญชีซ้ำในระดับเดียวกัน</p>
            <div class="flex-row" style="gap: 0.5rem">
              <button type="button" class="btn btn-primary btn-sm">บันทึก</button>
              <button type="button" class="btn btn-sm">ลบ (ถ้าแก้ไข)</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
