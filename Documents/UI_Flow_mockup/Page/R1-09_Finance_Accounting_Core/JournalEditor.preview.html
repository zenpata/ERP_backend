<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance — แก้ไข Journal — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — JournalEditorPage</span>
      <div class="flex-row" style="gap: 0.75rem; align-items: center; flex-wrap: wrap">
        <label class="preview-toggle"><input type="checkbox" id="toggleUnbalanced" /> แสดง error ไม่สมดุล</label>
        <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
      </div>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">การเงิน</div>
          <a class="nav-link active" href="#">สมุดรายวัน</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">แก้ไข Journal</span>
          <div class="header-actions">
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">Journal ใหม่</h1>
            <button type="button" class="btn btn-sm">ยกเลิก</button>
          </div>

          <div class="card card-pad grid-2">
            <div class="field">
              <span class="label">วันที่ทำรายการ</span>
              <input class="input" type="date" />
            </div>
            <div class="field">
              <span class="label">เลขที่อ้างอิง</span>
              <input class="input" placeholder="optional" />
            </div>
            <div class="field field-span-full">
              <span class="label">คำอธิบายหัวเรื่อง</span>
              <input class="input" />
            </div>
          </div>

          <div class="card card-pad stack-y-4">
            <div class="flex-row" style="justify-content: space-between; align-items: center">
              <h3 class="subsection-title m-0">บรรทัดรายการ</h3>
              <button type="button" class="btn btn-sm">+ แถว</button>
            </div>
            <div class="table-wrap">
              <table class="data">
                <thead>
                  <tr>
                    <th>บัญชี</th>
                    <th>คำอธิบาย</th>
                    <th class="text-right">Debit</th>
                    <th class="text-right">Credit</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><input class="input text-mono" value="5-5200" /></td>
                    <td><input class="input" value="ค่าใช้จ่าย" /></td>
                    <td class="text-right"><input class="input input-w-88" type="number" value="10000" /></td>
                    <td class="text-right"><input class="input input-w-88" type="number" value="" /></td>
                    <td><button type="button" class="btn btn-sm btn-danger">ลบ</button></td>
                  </tr>
                  <tr>
                    <td><input class="input text-mono" value="1-1000" /></td>
                    <td><input class="input" value="เงินสด" /></td>
                    <td class="text-right"><input class="input input-w-88" type="number" value="" /></td>
                    <td class="text-right"><input class="input input-w-88" type="number" id="creditVal" value="9999" /></td>
                    <td><button type="button" class="btn btn-sm btn-danger">ลบ</button></td>
                  </tr>
                </tbody>
              </table>
            </div>
            <p id="balErr" class="error-text" hidden>ยอด Debit และ Credit ต้องเท่ากัน</p>
            <div class="flex-row text-muted">
              <span>รวม Debit: <strong id="sumDr">฿10,000.00</strong></span>
              <span>รวม Credit: <strong id="sumCr">฿9,999.00</strong></span>
            </div>
            <div class="flex-row" style="gap: 0.5rem">
              <button type="button" class="btn btn-primary btn-sm">บันทึก draft</button>
              <button type="button" class="btn btn-sm">Post</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var dark = document.getElementById("previewDarkMode");
        var unb = document.getElementById("toggleUnbalanced");
        var err = document.getElementById("balErr");
        function syncDark() {
          if (dark) document.documentElement.classList.toggle("dark", dark.checked);
        }
        function syncErr() {
          if (err && unb) err.hidden = !unb.checked;
        }
        if (dark) {
          dark.addEventListener("change", syncDark);
          syncDark();
        }
        if (unb) {
          unb.addEventListener("change", syncErr);
          syncErr();
        }
      })();
    </script>
  </body>
</html>
