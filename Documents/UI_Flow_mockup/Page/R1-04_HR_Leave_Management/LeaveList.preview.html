<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HR — การลา — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — LeaveListPage</span>
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">HR</div>
          <a class="nav-link active" href="#">การลา</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">การลา</span>
          <div class="header-actions">
            <button type="button" class="icon-btn">🔔</button>
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">คำขอลา</h1>
          </div>

          <div class="card card-pad">
            <h3 class="section-title">ยื่นคำขอลา</h3>
            <div class="grid-2">
              <div class="field field-span-full">
                <span class="label">ประเภทการลา</span>
                <select class="text-input"><option>— เลือก —</option></select>
              </div>
              <div class="field">
                <span class="label">วันเริ่ม</span>
                <input class="input" type="date" />
              </div>
              <div class="field">
                <span class="label">วันสิ้นสุด</span>
                <input class="input" type="date" />
              </div>
              <div class="field field-span-full">
                <span class="label">เหตุผล</span>
                <textarea class="input" rows="2"></textarea>
              </div>
            </div>
            <button type="button" class="btn btn-primary mt-3">ส่งคำขอ</button>
          </div>

          <div class="flex-row">
            <span class="text-muted">กรองสถานะ</span>
            <select class="text-input select-auto">
              <option>ทั้งหมด</option>
              <option>pending</option>
            </select>
          </div>

          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>พนักงาน</th>
                  <th>ประเภท</th>
                  <th>ช่วงวันที่</th>
                  <th>สถานะ</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>EMP001 — สมชาย ใจดี</td>
                  <td>ลาป่วย</td>
                  <td>10/04/2568 – 11/04/2568 (2d)</td>
                  <td><span class="badge badge-warn">pending</span></td>
                  <td>
                    <a href="#" class="link">อนุมัติ</a>
                    <a href="#" class="link link--destructive ml-2">ปฏิเสธ</a>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="flex-row flex-between">
            <span class="text-muted">หน้า 1 / 1</span>
            <div class="flex-row">
              <button type="button" class="btn btn-sm" disabled>ก่อนหน้า</button>
              <button type="button" class="btn btn-sm" disabled>ถัดไป</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("previewDarkMode");
        if (!el) return;
        function s() {
          document.documentElement.classList.toggle("dark", el.checked);
        }
        el.addEventListener("change", s);
        s();
      })();
    </script>
  </body>
</html>
