<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM — Progress — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — ProgressListPage</span>
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">PM</div>
          <a class="nav-link active" href="#">Progress</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">Project Progress</span>
          <div class="header-actions">
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content stack-y-4">
          <div class="page-header">
            <h1 class="m-0">งาน / Tasks</h1>
            <button type="button" class="btn btn-primary btn-sm">+ สร้าง Task</button>
          </div>
          <div class="card card-pad">
            <div class="flex-row flex-between mb-3">
              <h3 class="subsection-title">สรุปตามโมดูล</h3>
              <button type="button" class="btn btn-ghost btn-sm text-primary text-xs">↻ retry</button>
            </div>
            <div class="grid-4">
              <div>
                <div class="flex-row flex-between">
                  <strong>HR</strong>
                  <span class="text-muted">60%</span>
                </div>
                <div class="progress progress--md progress-mt"><span class="w-60p"></span></div>
                <div class="hint">8 งาน</div>
              </div>
            </div>
          </div>
          <div class="card card-pad">
            <input class="input input-max-w-lg" placeholder="ค้นหางาน..." />
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>งาน</th>
                  <th>Module</th>
                  <th>ความคืบหน้า</th>
                  <th>สถานะ</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="text-mono">t1</td>
                  <td>Design DB schema</td>
                  <td class="text-muted">HR</td>
                  <td class="td-min-w-140">
                    <div class="flex-row progress-row">
                      <div class="progress progress--md"><span class="w-45p"></span></div>
                      <span class="hint">45%</span>
                    </div>
                  </td>
                  <td><span class="badge badge-outline">In Progress</span></td>
                  <td><a href="#" class="link">แก้ไข</a></td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("previewDarkMode");
        if (!el) return;
        function s() {
          document.documentElement.classList.toggle("dark", el.checked);
        }
        el.addEventListener("change", s);
        s();
      })();
    </script>
  </body>
</html>
