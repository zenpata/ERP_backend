<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM — ฟอร์ม Task — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — TaskFormPage</span>
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">PM</div>
          <a class="nav-link active" href="#">Progress</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">สร้าง Task</span>
          <div class="header-actions">
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content max-w-2xl stack-y-4">
          <div class="breadcrumb"><a href="#">Progress</a> / สร้าง Task</div>
          <h1 class="page-h1">สร้าง Task</h1>
          <div class="card">
            <div class="card-head">รายละเอียดงาน</div>
            <div class="card-body grid-2">
              <div class="field field-span-full">
                <span class="label">ชื่องาน *</span>
                <input class="input" />
              </div>
              <div class="field">
                <span class="label">Module *</span>
                <input class="input" value="HR" />
              </div>
              <div class="field">
                <span class="label">Phase *</span>
                <input class="input" value="Development" />
              </div>
              <div class="field">
                <span class="label">สถานะ *</span>
                <select class="text-input">
                  <option>Not Started</option>
                  <option>In Progress</option>
                  <option>Done</option>
                </select>
              </div>
              <div class="field">
                <span class="label">Priority *</span>
                <select class="text-input"><option>Medium</option></select>
              </div>
              <div class="field">
                <span class="label">Progress %</span>
                <input class="input" type="number" value="0" min="0" max="100" />
              </div>
              <div class="field">
                <span class="label">เริ่ม *</span>
                <input class="input" type="date" />
              </div>
              <div class="field">
                <span class="label">เป้าหมาย *</span>
                <input class="input" type="date" />
              </div>
              <div class="field field-span-full">
                <span class="label">ผู้รับผิดชอบ *</span>
                <input class="input" />
              </div>
            </div>
          </div>
          <div class="flex-row flex-end">
            <button type="button" class="btn">ยกเลิก</button>
            <button type="button" class="btn btn-primary">บันทึก</button>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("previewDarkMode");
        if (!el) return;
        function s() {
          document.documentElement.classList.toggle("dark", el.checked);
        }
        el.addEventListener("change", s);
        s();
      })();
    </script>
  </body>
</html>
