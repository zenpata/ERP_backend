<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings — Users — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — UsersPage</span>
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">Settings</div>
          <a class="nav-link active" href="#">Users</a>
          <a class="nav-link" href="#">Roles</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">จัดการ User</span>
          <div class="header-actions">
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content stack-y-4">
          <div class="page-header">
            <div>
              <h1 class="m-0">Users</h1>
              <p class="text-muted">กำหนด role และสถานะ active (mock)</p>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>Email</th>
                  <th>ชื่อ</th>
                  <th>Roles</th>
                  <th>สถานะ</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>admin@erp.com</td>
                  <td class="text-muted">Admin</td>
                  <td class="text-mono">super_admin</td>
                  <td><span class="badge badge-success">Active</span></td>
                  <td>
                    <select class="text-input select-compact">
                      <option>super_admin</option>
                      <option>hr_admin</option>
                    </select>
                    <label class="flex-row checkbox-label-muted">
                      <input type="checkbox" checked /> Active
                    </label>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("previewDarkMode");
        if (!el) return;
        function s() {
          document.documentElement.classList.toggle("dark", el.checked);
        }
        el.addEventListener("change", s);
        s();
      })();
    </script>
  </body>
</html>
