<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ลูกค้า — รายการ — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — CustomerListPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">ขาย / ลูกค้า</div>
          <a class="nav-link active" href="#">ลูกค้า</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">ลูกค้า</span>
          <div class="header-actions"><div class="avatar">A</div></div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">ลูกค้า</h1>
            <button type="button" class="btn btn-primary btn-sm">เพิ่มลูกค้า</button>
          </div>
          <div class="card card-pad flex-row filter-toolbar--tight">
            <input class="input input-max-w-xs" placeholder="ค้นหา ชื่อ / รหัส / อีเมล" />
            <select class="text-input select-auto"><option>ทุกสถานะ</option></select>
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>รหัส</th>
                  <th>ชื่อ</th>
                  <th>เบอร์</th>
                  <th>สถานะ</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="text-mono">C-001</td>
                  <td>บริษัท ตัวอย่าง จำกัด</td>
                  <td>02-123-4567</td>
                  <td><span class="badge badge-success">active</span></td>
                  <td><a href="#" class="link">เปิด</a></td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
