<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ลูกค้า — ฟอร์ม — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — CustomerFormPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">ขาย / ลูกค้า</div>
          <a class="nav-link active" href="#">ลูกค้า</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">ลูกค้า — แก้ไข</span>
          <div class="header-actions"><div class="avatar">A</div></div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">เพิ่ม / แก้ไข ลูกค้า</h1>
            <button type="button" class="btn btn-sm">ยกเลิก</button>
          </div>
          <div class="card card-pad grid-2">
            <div class="field"><span class="label">ชื่อบริษัท / บุคคล</span><input class="input" /></div>
            <div class="field"><span class="label">เลขผู้เสียภาษี</span><input class="input" /></div>
            <div class="field"><span class="label">อีเมล</span><input class="input" type="email" /></div>
            <div class="field"><span class="label">โทรศัพท์</span><input class="input" /></div>
            <div class="field field-span-full"><span class="label">ที่อยู่</span><input class="input" /></div>
          </div>
          <div class="flex-row" style="gap: 0.5rem">
            <button type="button" class="btn btn-primary btn-sm">บันทึก</button>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
