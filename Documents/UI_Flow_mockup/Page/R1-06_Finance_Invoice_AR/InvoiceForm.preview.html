<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance — สร้างใบแจ้งหนี้ — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — InvoiceFormPage</span>
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">การเงิน</div>
          <a class="nav-link active" href="#">ใบแจ้งหนี้</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">สร้างใบแจ้งหนี้</span>
          <div class="header-actions">
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content max-w-3xl stack-y-6">
          <div class="page-header">
            <h1 class="m-0">สร้างใบแจ้งหนี้</h1>
          </div>
          <div class="card card-pad stack-y-4">
            <div class="grid-2">
              <div class="field field-span-full">
                <span class="label">ลูกค้า</span>
                <select class="text-input"><option>C001 — บริษัท ตัวอย่าง</option></select>
              </div>
              <div class="field">
                <span class="label">ครบกำหนด</span>
                <input class="input" type="date" />
              </div>
              <div class="field field-span-full">
                <span class="label">หมายเหตุ</span>
                <textarea class="input" rows="2"></textarea>
              </div>
            </div>
            <div>
              <div class="flex-row flex-between mb-2">
                <strong>รายการ</strong>
                <button type="button" class="btn btn-ghost btn-sm text-primary">+ เพิ่มบรรทัด</button>
              </div>
              <div class="card card-pad border-dashed">
                <div class="grid-2 items-end">
                  <input class="input" placeholder="รายละเอียด" />
                  <input class="input" type="number" placeholder="จำนวน" />
                  <input class="input" type="number" placeholder="ราคา/หน่วย" />
                  <input class="input" type="number" placeholder="VAT %" value="7" />
                  <button type="button" class="btn btn-sm btn-danger">ลบ</button>
                </div>
              </div>
            </div>
            <div class="flex-row">
              <button type="button" class="btn btn-primary">บันทึก</button>
              <button type="button" class="btn">ยกเลิก</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("previewDarkMode");
        if (!el) return;
        function s() {
          document.documentElement.classList.toggle("dark", el.checked);
        }
        el.addEventListener("change", s);
        s();
      })();
    </script>
  </body>
</html>
