<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance — ใบแจ้งหนี้ — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — InvoiceListPage</span>
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">การเงิน</div>
          <a class="nav-link active" href="#">ใบแจ้งหนี้</a>
          <a class="nav-link" href="#">ผู้ขาย</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">ใบแจ้งหนี้</span>
          <div class="header-actions">
            <button type="button" class="icon-btn">🔔</button>
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">รายการใบแจ้งหนี้</h1>
            <button type="button" class="btn btn-primary btn-sm">+ สร้างใบแจ้งหนี้</button>
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>เลขที่</th>
                  <th>ลูกค้า</th>
                  <th>ครบกำหนด</th>
                  <th class="text-right">ยอดรวม</th>
                  <th>สถานะ</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="text-mono">INV-2025-001</td>
                  <td>บริษัท ตัวอย่าง จำกัด</td>
                  <td>30/04/2568</td>
                  <td class="text-right">฿107,000.00</td>
                  <td><span class="badge badge-warn">sent</span></td>
                </tr>
                <tr>
                  <td class="text-mono">INV-2025-002</td>
                  <td>ลูกค้าทดสอบ</td>
                  <td>15/05/2568</td>
                  <td class="text-right">฿21,400.00</td>
                  <td><span class="badge badge-success">paid</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("previewDarkMode");
        if (!el) return;
        function s() {
          document.documentElement.classList.toggle("dark", el.checked);
        }
        el.addEventListener("change", s);
        s();
      })();
    </script>
  </body>
</html>
