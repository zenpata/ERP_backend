<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance — ฟอร์มผู้ขาย — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — VendorFormPage</span>
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">การเงิน</div>
          <a class="nav-link active" href="#">ผู้ขาย</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">สร้างผู้ขาย</span>
          <div class="header-actions">
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content max-w-2xl stack-y-6">
          <div class="page-header">
            <h1 class="m-0">สร้างผู้ขาย</h1>
            <a href="#" class="link link--md">← กลับรายการ</a>
          </div>
          <div class="card card-pad stack-y-4">
            <div class="field">
              <span class="label">รหัส (ถ้าว่างระบบ gen)</span>
              <input class="input" placeholder="เว้นว่างได้" />
            </div>
            <div class="field">
              <span class="label">ชื่อ *</span>
              <input class="input" />
            </div>
            <div class="grid-2">
              <div class="field">
                <span class="label">เลขผู้เสียภาษี</span>
                <input class="input" />
              </div>
              <div class="field">
                <span class="label">อีเมล</span>
                <input class="input" type="email" />
              </div>
              <div class="field">
                <span class="label">โทรศัพท์</span>
                <input class="input" />
              </div>
              <div class="field">
                <span class="label">เครดิต (วัน)</span>
                <input class="input" type="number" value="30" />
              </div>
            </div>
            <div class="field">
              <span class="label">ที่อยู่</span>
              <textarea class="input" rows="2"></textarea>
            </div>
            <button type="button" class="btn btn-primary">บันทึก</button>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("previewDarkMode");
        if (!el) return;
        function s() {
          document.documentElement.classList.toggle("dark", el.checked);
        }
        el.addEventListener("change", s);
        s();
      })();
    </script>
  </body>
</html>
