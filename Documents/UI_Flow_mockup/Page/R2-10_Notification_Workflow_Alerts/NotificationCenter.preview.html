<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>แจ้งเตือน — ศูนย์กลาง — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — NotificationCenterPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">ระบบ</div>
          <a class="nav-link active" href="#">การแจ้งเตือน</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">การแจ้งเตือน</span>
          <div class="header-actions">
            <button type="button" class="icon-btn">🔔</button>
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">ศูนย์แจ้งเตือน</h1>
            <button type="button" class="btn btn-sm">ทำเครื่องหมายอ่านทั้งหมด</button>
          </div>
          <div class="stack-y-2">
            <div class="card card-pad flex-row" style="justify-content: space-between; align-items: flex-start">
              <div>
                <div class="font-medium">ใบแจ้งหนี้ INV-2025-001 ถูกชำระแล้ว</div>
                <div class="text-muted text-sm">10 นาทีที่แล้ว</div>
              </div>
              <span class="badge badge-warn">unread</span>
            </div>
            <div class="card card-pad">
              <div class="font-medium">PO-2025-010 รออนุมัติ</div>
              <div class="text-muted text-sm">เมื่อวาน</div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
