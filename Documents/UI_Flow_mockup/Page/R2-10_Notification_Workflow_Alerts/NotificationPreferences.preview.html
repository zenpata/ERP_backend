<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>แจ้งเตือน — การตั้งค่า — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — NotificationPreferencesPage</span>
      <label class="preview-toggle"><input type="checkbox" id="previewDarkMode" /> Dark mode</label>
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">ระบบ</div>
          <a class="nav-link active" href="#">การแจ้งเตือน</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">การตั้งค่าแจ้งเตือน</span>
          <div class="header-actions"><div class="avatar">A</div></div>
        </header>
        <main class="main-content stack-y-6">
          <div class="page-header">
            <h1 class="m-0">ช่องทางแจ้งเตือน</h1>
          </div>
          <div class="card card-pad stack-y-4">
            <label class="flex-row" style="gap: 0.5rem; align-items: center"><input type="checkbox" checked /> In-app</label>
            <label class="flex-row" style="gap: 0.5rem; align-items: center"><input type="checkbox" /> อีเมล</label>
            <label class="flex-row" style="gap: 0.5rem; align-items: center"><input type="checkbox" /> Line (ถ้ามี)</label>
            <button type="button" class="btn btn-primary btn-sm">บันทึก</button>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var d = document.getElementById("previewDarkMode");
        if (d) {
          d.addEventListener("change", function () {
            document.documentElement.classList.toggle("dark", d.checked);
          });
          document.documentElement.classList.toggle("dark", d.checked);
        }
      })();
    </script>
  </body>
</html>
