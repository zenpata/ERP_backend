<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PM — Budget — Preview</title>
    <link rel="stylesheet" href="../_Shared/preview-base.css" />
  </head>
  <body>
    <div class="preview-banner">
      <span><strong>Static preview</strong> — BudgetListPage</span>
      <label class="preview-toggle"
        ><input type="checkbox" id="previewDarkMode" /> Dark mode</label
      >
    </div>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon">💼</div>
          <div>
            <div class="sidebar-brand-title">ERP System</div>
            <div class="sidebar-brand-sub">SME Edition</div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group-label">PM</div>
          <a class="nav-link active" href="#">Budget</a>
        </nav>
      </aside>
      <div class="col-main">
        <header class="header-bar">
          <span class="header-title">Project Budget</span>
          <div class="header-actions">
            <div class="avatar">A</div>
          </div>
        </header>
        <main class="main-content stack-y-4">
          <div class="page-header">
            <h1 class="m-0">รายการ Budget</h1>
            <button type="button" class="btn btn-primary btn-sm">+ สร้าง</button>
          </div>
          <div class="card card-pad">
            <input class="input input-max-w-md" placeholder="ค้นหาโปรเจค..." />
          </div>
          <div class="table-wrap">
            <table class="data">
              <thead>
                <tr>
                  <th>รหัส</th>
                  <th>โปรเจค</th>
                  <th>ยอดรวม</th>
                  <th>ประเภท</th>
                  <th>Owner</th>
                  <th>สถานะ</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="text-mono">BGT-001</td>
                  <td>Project Alpha</td>
                  <td>฿1,000,000</td>
                  <td class="text-muted">CAPEX</td>
                  <td class="text-muted">สมชาย</td>
                  <td><span class="badge badge-outline">active</span></td>
                  <td><button type="button" class="icon-btn">👁</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var el = document.getElementById("previewDarkMode");
        if (!el) return;
        function s() {
          document.documentElement.classList.toggle("dark", el.checked);
        }
        el.addEventListener("change", s);
        s();
      })();
    </script>
  </body>
</html>
